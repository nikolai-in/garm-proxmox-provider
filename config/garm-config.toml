[default]
# IMPORTANT: Replace <YOUR_DOCKER_HOST_IP> with the IP address of your machine
# that is reachable from the Proxmox VMs/Containers. (e.g., 192.168.1.100)
# 'localhost' or '127.0.0.1' will NOT work since runners need to reach back to GARM.
callback_url = "http://<YOUR_DOCKER_HOST_IP>:9999"
metadata_url = "http://<YOUR_DOCKER_HOST_IP>:9999/api/v1/metadata"

[apiserver]
bind = "0.0.0.0"
port = 9999

[jwt_auth]
secret = "local-development-secret-do-not-use-in-prod"
time_to_live = "8760h"

[database]
backend = "sqlite3"

[database.sqlite3]
# Mounts to the volume mapped in docker-compose.yml
db_file = "/etc/garm/garm.db"

[[provider]]
name = "proxmox"
description = "Proxmox VE External Provider"
provider_type = "external"
# This points to the symlink we created in the Dockerfile
provider_executable = "/opt/garm/providers.d/garm-proxmox-provider"
